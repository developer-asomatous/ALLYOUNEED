version: '3.9'
services:
  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      - REDIS_URL=redis://redis:6379
      - STORAGE_PATH=/tmp/ayn-downloads
      - PORT=3000
    volumes:
      - downloads:/tmp/ayn-downloads
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    restart: unless-stopped

volumes:
  downloads:
  redis-data:
